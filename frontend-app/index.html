<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LBU Academy Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">

        <!-- Auth Section -->
        <div id="auth-section">
            <div class="auth-card">
                <div class="portal-header">
                    <h1>🎓 LBU Academy</h1>
                    <p>Student Portal</p>
                </div>
                <div class="tab-switcher">
                    <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                    <button class="tab-btn" onclick="switchTab('register')">Register</button>
                </div>

                <!-- Login Form -->
                <div id="login-tab">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="login-username" placeholder="Enter username">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="login-password" placeholder="Enter password">
                    </div>
                    <button class="btn-primary" onclick="login()">Login</button>
                    <div id="login-error" class="error-msg"></div>
                </div>

                <!-- Register Form -->
                <div id="register-tab" style="display:none">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="reg-username" placeholder="Choose username">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="reg-password" placeholder="Choose password">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="reg-email" placeholder="Enter email">
                    </div>
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="reg-firstname" placeholder="Enter first name">
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="reg-lastname" placeholder="Enter last name">
                    </div>
                    <button class="btn-primary" onclick="register()">Create Account</button>
                    <div id="register-error" class="error-msg"></div>
                </div>
            </div>
        </div>

        <!-- Dashboard Section -->
        <div id="dashboard-section" style="display:none">
            <nav class="navbar">
                <div class="nav-brand">🎓 LBU Academy Portal</div>
                <div class="nav-links">
                    <button onclick="showPage('courses')">Courses</button>
                    <button onclick="showPage('enrolments')">My Enrolments</button>
                    <button onclick="showPage('profile')">Profile</button>
                    <button onclick="showPage('graduation')">Graduation</button>
                    <button class="btn-logout" onclick="logout()">Logout</button>
                </div>
            </nav>

            <div class="dashboard-content">

                <!-- Courses Page -->
                <div id="page-courses" class="page">
                    <h2>Available Courses</h2>
                    <div id="courses-list" class="cards-grid"></div>
                </div>

                <!-- Enrolments Page -->
                <div id="page-enrolments" class="page" style="display:none">
                    <h2>My Enrolments</h2>
                    <div id="enrolments-list" class="cards-grid"></div>
                </div>

                <!-- Profile Page -->
                <div id="page-profile" class="page" style="display:none">
                    <h2>Student Profile</h2>
                    <div class="profile-card">
                        <div id="profile-info"></div>
                        <hr>
                        <h3>Update Name</h3>
                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" id="update-firstname" placeholder="First name">
                        </div>
                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" id="update-lastname" placeholder="Last name">
                        </div>
                        <button class="btn-primary" onclick="updateProfile()">Save Changes</button>
                        <div id="profile-msg" class="success-msg"></div>
                    </div>
                </div>

                <!-- Graduation Page -->
                <div id="page-graduation" class="page" style="display:none">
                    <h2>Graduation Eligibility</h2>
                    <div id="graduation-result" class="graduation-card"></div>
                </div>

            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
